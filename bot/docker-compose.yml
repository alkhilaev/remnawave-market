services:
  # Telegram Bot
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: remnawave-market-bot
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    networks:
      - remnawave-network

networks:
  remnawave-network:
    external: true
